<!DOCTYPE html>
<html>
 <head>
   <title>JavaScript Accessing Arrays</title>
 </head>
 <body>
  <script>
    var colors = ["Red", "Green", "Blue"];
    document.write(colors);
    document.write("<br>");
    document.write(colors[0]);
    document.write("<br>");
    document.write(colors[1]);
    document.write("<br>");
    document.write(colors[2]);
</script>
 </body>
</html>
