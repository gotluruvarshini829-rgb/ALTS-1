<!DOCTYPE html>

 <head>
   <title>JavaScript storing single value</title>
 </head>
 <body>
  <script>
    var color1 = "Red";
    var color2 = "Green";
    var color3 = "Blue";      
      document.write(color1 + "<br>");
      document.write(color2 + "<br>");
      document.write(color3);
  </script>
 </body>
</html>
