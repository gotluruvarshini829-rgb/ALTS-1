<!DOCTYPE html>
<html>
 <head>
   <title>Number Example</title>
 </head>
 <body>
    <script>
      var a =25;
      var b = 80.5;
      var c = 4.25e+6;
      var d = 4.25e-6;
      document.write(a);
      document.write("<br>");
      document.write(b);
      document.write("<br>");
      document.write(c);
      document.write("<br>");
      document.write(d);
      document.write("<br>");
    </script>
</body>
</html>
